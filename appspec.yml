version: 0.0
os: linux

files:
  - source: frontend/build
    destination: /var/www/html

  - source: backend
    destination: /home/ubuntu/backend

  - source: scripts
    destination: /home/ubuntu/scripts

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/start.sh
      timeout: 300
      runas: root